<!DOCTYPE html>
<html>
<head>
  <title>Mornings with Mom</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fffaf5;
      padding: 40px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 30px;
    }

    button {
      font-size: 20px;
      padding: 15px 25px;
      border-radius: 10px;
      border: none;
      background-color: #ffb6a3;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Tap to hear a random morning with her 💛</h1>

<button onclick="playClip()">Play</button>

<audio id="player"></audio>

<script>
  const clips = [
    "https://slimpow.github.io/hi-mama/neira-hi.mp3",
    "https://slimpow.github.io/hi-mama/hello.mp3",
    "https://slimpow.github.io/hi-mama/woofwoof.mp3",
    "https://slimpow.github.io/hi-mama/ohhhh.mp3",
    "https://slimpow.github.io/hi-mama/book.mp3",
    "https://slimpow.github.io/hi-mama/yodel.mp3",
    "https://slimpow.github.io/hi-mama/yoto.mp3"
  ];

  function playClip() {
    const player = document.getElementById("player");

    const clip = clips[Math.floor(Math.random() * clips.length)];

    player.src = clip;
    player.load();

    const playPromise = player.play();

    if (playPromise !== undefined) {
      playPromise.catch(err => {
        alert("Tap again to play audio");
        console.log(err);
      });
    }
  }
</script>

</body>
</html>
