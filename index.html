<!DOCTYPE html>
<html>
<head>
  <title>Mornings with Mom</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fffaf5;
      padding: 40px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 30px;
    }

    button {
      font-size: 20px;
      padding: 15px 25px;
      border-radius: 10px;
      border: none;
      background-color: #ffb6a3;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Tap to hear a random morning with her 💛</h1>

<button onclick="playClip()">Play</button>

<audio id="player"></audio>

<script>
  const clips = [
    "https://drive.google.com/uc?export=download&id=1JySnwhM1bQ9hmxrwMr5FIcRu9S_HGBRk"
  ];

  function playClip() {
    const player = document.getElementById("player");

    // pick clip (only one for now, but ready for more)
    const clip = clips[Math.floor(Math.random() * clips.length)];

    console.log("Trying to play:", clip);

    player.src = clip;
    player.load();

    const playPromise = player.play();

    if (playPromise !== undefined) {
      playPromise.catch(err => {
        alert("Audio couldn't play. Tap again or check file sharing settings.");
        console.log(err);
      });
    }
  }
</script>

</body>
</html>
